project: NotifySync
version: 5.2.2.0
targetAbi: 10.11.0.0
build:
  - CRITICAL : Élimination du syndrome du 'média fantôme' (lorsque le téléchargement des images TMDB accusait un retard réseau) via intégration dans l'ItemUpdated (v5.2.2.0).
  - PERFORMANCE : Instauration d'un cache mémoire absolu (0ms, 0 File I/O) pour empêcher le rechargement intempestif sur le disque du client.js natif pour chaque client ou TV s'y connectant. (v5.2.2.0).
  - CRITICAL : Élimination du "ThreadPool Starvation" (Freeze Web) causé par le Parallel.ForEach lors de l'accès au menu de notifications (v5.2.2.0).
  - CRITICAL : Élimination d'un sévère goulot d'étranglement bloquant l'API Web lors du 'Tout marquer comme vu' (passage en asynchrone) (v5.2.2.0).
  - FEATURE : Le scan de l'historique (NotifySync) se lance désormais automatiquement au démarrage de Jellyfin (v5.2.0.0).
  - CRITICAL : Limitation stricte de l'historique en base de données à 100 éléments par catégorie pour une stabilité absolue (v5.2.0.0).
  - FIX : Le statut "Vu" (cloches et petites pastilles vertes) se synchronise désormais réellement avec Jellyfin lors du clic sur "Tout marquer comme lu" (v5.2.0.0).
  - CRITICAL : Résolution du bug de perte de la base de données au redémarrage (HistoryScanTask) et conflit de versions. (v5.1.0.2).
  - FIX : Refonte du Client.js (hook 'authenticated') pour affichage instantané des notifications au login sans F5 (v5.1.0.2).
  - UI : Amélioration de l'intégration visuelle de la cloche (espacement et alignement parfaits avec les icônes natives) (v5.1.0.2).
  - FIX : Le cache utilisateur se met à jour automatiquement quand un item passe de vu à non vu (et inversement) (v5.1.0.2).
  - FIX : Marquer une saison entière comme vue met à jour la cloche instantanément (v5.1.0.2).
  - FEATURE : Quota par utilisateur - seuls les X derniers items non vus par catégorie sont affichés (v5.1.0.2).
  - FEATURE : Support File Transformation pour injection automatique du script client (tous les OS) (v5.1.0.0).
  - FEATURE : Intégration des WebSockets pour un rafraîchissement temps réel absolu (client.js) (v5.0.0.0).
  - REFACTOR : Modernisation de l'interface de configuration en ES6 (ConfigurationPage.html) (v5.0.0.0).
  - CRITICAL : Prévention de Corruption de Fichier (Windows vs Linux) en utilisant un buffer temporaire pour users_seen.json (v4.8.0.3).
  - PERFORMANCE : Élimination d'un sévère goulot d'étranglement CPU (Lock Escalation) lié à la vérification cache concurrente (v4.8.0.3).
  - PERFORMANCE : Allègement drastique des itérations de Visibilité via traitement Multi-threading Parallel.ForEach (v4.8.0.3).
  - FIXED : La catégorie 'Séries' apparaît désormais correctement (Correction du 'Quota Starvation' où les épisodes IPTV/VOD masquaient les séries locales) (v4.8.0.2).
  - PERFORMANCE : Les requêtes de scan sont désormais ciblées sur les dossiers sélectionnés via AncestorIds (v4.8.0.2).
  - FIX : Les Extras (Génériques, Openings de la Saison 0) ne polluent plus la liste des nouveaux épisodes (v4.8.0.1).
  - FIX : Filtrage intelligent des items de streaming (XFusion VOD/Séries) — exclusion automatique des contenus IPTV non-locaux.
  - FIX : Correction du statut "Vu/Non vu" par épisode (suppression de la propagation série → épisodes).
  - FIX : Le clic sur une série dans la cloche ne marque plus tous les épisodes comme vus.
  - FIX : Affichage du nombre réel d'épisodes non vus par l'utilisateur (au lieu du total).
  - FIX : Désactivation du cache navigateur sur Client.js pour prise en compte immédiate des mises à jour.
  - STABILITÉ : Filtrage configurable des bibliothèques par CategoryMapping (avec/sans bibliothèque cochée).
  - STABILITÉ : Build finale avec 0 avertissement stricts sur .NET 9.0.
